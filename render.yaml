services:
  - type: web
    name: ppt-to-pdf
    runtime: python
    buildCommand: apt-get update && apt-get install -y libreoffice && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
